version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: turbofan_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turbofan}
      POSTGRES_USER: ${POSTGRES_USER:-turbofan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turbofan_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbofan"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: turbofan_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/turbofan_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "turbofan_dev", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build: .
    container_name: turbofan_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://turbofan:turbofan_dev@db:5432/turbofan
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./models:/app/models

  frontend:
    build: ./frontend
    container_name: turbofan_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  neo4j_data:
