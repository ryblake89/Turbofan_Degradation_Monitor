version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: turbofan_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turbofan}
      POSTGRES_USER: ${POSTGRES_USER:-turbofan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turbofan_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turbofan"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: turbofan_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://turbofan:turbofan_dev@db:5432/turbofan
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models

volumes:
  pgdata:
